<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Encoder Retrain — Factigent</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fbff;
        --surface: #ffffff;
        --surface-2: #eef6ff;
        --text: #0f172a;
        --muted: #64748b;
        --border: rgba(15, 23, 42, 0.1);
        --accent: #06b6d4;
        --accent-2: #0ea5e9;
        --shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      }

      /* Page-specific layout while reusing the design system variables */
      .retrain-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 28px;
        padding: 48px;
        background: radial-gradient(circle at top left, rgba(6,182,212,0.06), transparent 28%), var(--bg);
        color: var(--text);
        font-family: 'Inter', system-ui, Arial, sans-serif;
      }

      .panel-card {
        border-radius: 20px;
        padding: 28px;
        background: var(--surface, rgba(255,255,255,0.03));
        border: 1px solid var(--border, rgba(255,255,255,0.06));
        box-shadow: var(--shadow, 0 20px 60px rgba(2,6,23,0.15));
      }

      .hero-title { margin: 0 0 8px; font-size: 1.6rem; }
      .hero-sub { margin: 0 0 18px; color: var(--muted); }

      .section-title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 12px;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .section-title::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
      }

      .form-grid { display: grid; gap: 14px; }

      .row { display: flex; gap: 12px; align-items: center; }

      .file-drop {
        border: 1px dashed var(--border);
        padding: 18px;
        border-radius: 12px;
        background: rgba(255,255,255,0.02);
        color: var(--muted);
      }

      label { font-weight: 600; color: var(--text); }

      .small { font-size: 0.9rem; color: var(--muted); }

      .controls { display: grid; gap: 12px; margin-top: 6px; }

      .field-group {
        display: grid;
        gap: 8px;
        min-width: 0;
      }

      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .field-group input,
      .field-group select {
        width: 100%;
        box-sizing: border-box;
        min-width: 0;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
        background-position: calc(100% - 16px) center, calc(100% - 10px) center;
        background-size: 6px 6px;
        background-repeat: no-repeat;
        padding-right: 36px;
      }

      .preview-box {
        height: 180px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, var(--surface-2, rgba(255,255,255,0.02)), var(--surface, rgba(255,255,255,0.03)));
        display: grid;
        place-items: center;
        color: var(--muted);
      }

      .preview-card {
        margin-top: 16px;
        padding: 16px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.025);
      }

      .preview-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 10px;
      }

      .preview-label {
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .preview-title {
        font-size: 1.02rem;
        font-weight: 700;
        color: var(--text);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(6, 182, 212, 0.14);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 600;
      }

      .summary-grid {
        display: grid;
        gap: 8px;
      }

      .summary-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(255,255,255,0.06);
      }

      .summary-item:first-child {
        padding-top: 0;
        border-top: 0;
      }

      .summary-value {
        font-weight: 600;
        color: var(--text);
        text-align: right;
      }

      .encoder-list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .encoder-list-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .encoder-list-header .small {
        background: rgba(15, 23, 42, 0.05);
        padding: 6px 10px;
        border-radius: 999px;
      }

      .encoder-card-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .encoder-card {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        padding: 16px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.02);
        transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
      }

      .encoder-card:hover {
        border-color: rgba(6, 182, 212, 0.24);
        box-shadow: 0 12px 24px rgba(6, 182, 212, 0.08);
      }

      .encoder-card.selected {
        border-color: rgba(6, 182, 212, 0.5);
        background: rgba(6, 182, 212, 0.08);
      }

      .encoder-card-check {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        border: 2px solid var(--border);
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }

      .encoder-card.selected .encoder-card-check {
        border-color: var(--accent);
        background: rgba(6, 182, 212, 0.18);
      }

      .encoder-card-check::after {
        content: '';
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: transparent;
      }

      .encoder-card.selected .encoder-card-check::after {
        background: var(--accent);
      }

      .encoder-name {
        font-weight: 700;
        color: var(--text);
        margin-bottom: 6px;
      }

      .encoder-meta {
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .param-list {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }

      .param-card {
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.02);
        cursor: pointer;
        transition: border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
      }

      .param-card:hover {
        border-color: rgba(6, 182, 212, 0.24);
        box-shadow: 0 10px 18px rgba(6, 182, 212, 0.08);
      }

      .param-card.selected {
        border-color: rgba(6, 182, 212, 0.5);
        background: rgba(6, 182, 212, 0.08);
      }

      .param-card-title {
        font-weight: 700;
        color: var(--text);
        margin-bottom: 6px;
      }

      .param-card-description {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .field-group .retrained-by {
        width: auto;
        max-width: 260px;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        display: inline-block;
        box-sizing: border-box;
        font-size: 0.95rem;
      }

      .selection-summary {
        margin-top: 12px;
        padding: 18px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.03);
      }

      .selection-summary .preview-top {
        flex-wrap: wrap;
        gap: 20px;
      }

      .primary-btn,
      .ghost-btn {
        border: 1px solid transparent;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 700;
        padding: 12px 18px;
        cursor: pointer;
        transition: background 150ms ease, border-color 150ms ease, color 150ms ease, box-shadow 150ms ease;
      }

      .primary-btn {
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        color: #fff;
        border-color: transparent;
        box-shadow: 0 12px 28px rgba(6, 182, 212, 0.18);
      }

      .primary-btn:hover:not(:disabled) {
        filter: brightness(1.05);
      }

      .ghost-btn {
        background: transparent;
        color: var(--text);
        border-color: rgba(15, 23, 42, 0.12);
      }

      .ghost-btn:hover:not(:disabled) {
        background: rgba(15, 23, 42, 0.04);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .selection-summary .preview-title {
        font-size: 1rem;
      }

      .encoder-table {
        display: grid;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.02);
      }

      .encoder-row {
        display: grid;
        grid-template-columns: 1.3fr 1fr 1fr;
        gap: 12px;
        padding: 14px 16px;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      .encoder-row:last-child {
        border-bottom: 0;
      }

      .encoder-row-head {
        background: rgba(15, 23, 42, 0.04);
        color: var(--muted);
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .encoder-cell {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .encoder-cell strong {
        font-weight: 700;
        color: var(--text);
      }

      .encoder-status {
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 900px) {
        .encoder-card-grid {
          grid-template-columns: 1fr;
        }
      }

      .log-area {
        height: 220px;
        overflow: auto;
        padding: 12px;
        border-radius: 12px;
        background: rgba(0,0,0,0.04);
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
        font-size: 0.95rem;
      }

      .progress-bar {
        height: 12px;
        background: rgba(15,23,42,0.06);
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 300ms linear;
      }

      @media (max-width: 900px) {
        .retrain-shell { grid-template-columns: 1fr; padding: 24px; }
      }
    </style>
  </head>
  <body>
    <main class="retrain-shell">
      <section class="panel-card">
        <h2 class="section-title" style="margin-top:18px">Encoder Retrain</h2>
        <div class="form-grid">
          <div class="field-group">
            <label>Machine name</label>
            <select id="machineName" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text)"></select>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label>Parameter name</label>
              <div id="parameterList" class="param-list"></div>
              <input id="parameterName" type="hidden" />
            </div>
            <div class="field-group">
              <label>Retrained by</label>
              <input id="retrainedBy" class="retrained-by" type="text" value="Alex Morgan" placeholder="Your name" />
            </div>
          </div>

          <div class="selection-summary" id="selectionSummary">
            <div class="preview-top">
              <div>
                <div class="preview-label">Selected machine</div>
                <div class="preview-title" id="selectedMachineText">None</div>
              </div>
              <div>
                <div class="preview-label">Selected parameters</div>
                <div class="preview-title" id="selectedParametersText">None</div>
              </div>
            </div>
          </div>

          <div class="encoder-list">
              <div class="encoder-list-header">
              <h4 style="margin:0">List of encoders</h4>
              <div style="display:flex;gap:8px">
                <span class="small">3 available</span>
              </div>
            </div>
            <div class="encoder-table">
              <div class="encoder-row encoder-row-head">
                <div>Encoder name</div>
                <div>Model</div>
                <div>Status</div>
              </div>
              <div class="encoder-row">
                <div class="encoder-cell"><strong>Encoder A</strong><span class="encoder-status">Production primary</span></div>
                <div>Text embedding</div>
                <div class="encoder-status">Active</div>
              </div>
              <div class="encoder-row">
                <div class="encoder-cell"><strong>Encoder B</strong><span class="encoder-status">QA validation</span></div>
                <div>Similarity search</div>
                <div class="encoder-status">Staged</div>
              </div>
              <div class="encoder-row">
                <div class="encoder-cell"><strong>Encoder C</strong><span class="encoder-status">Experimental snapshot</span></div>
                <div>Vision feature extraction</div>
                <div class="encoder-status">Preview</div>
              </div>
            </div>
          </div>

          <div style="display:flex;gap:12px;align-items:center">
            <button id="retrainBtn" class="primary-btn" style="width:180px">Start retrain</button>
            <button id="cancelBtn" class="ghost-btn" style="width:120px">Cancel</button>
            <div style="flex:1;text-align:right;color:var(--muted)" id="statusText">Idle</div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const retrainBtn = document.getElementById('retrainBtn');
      const cancelBtn = document.getElementById('cancelBtn');
      const statusText = document.getElementById('statusText');
      const machineName = document.getElementById('machineName');
      const parameterName = document.getElementById('parameterName');
      const parameterList = document.getElementById('parameterList');
      const selectedMachineText = document.getElementById('selectedMachineText');
      const selectedParametersText = document.getElementById('selectedParametersText');

      const demoMachines = [
        'Encoder-01',
        'Encoder-02',
        'Encoder-03',
        'Encoder-04',
        'Encoder-05'
      ];

      const demoParameters = [
        {
          key: 'embedding-config-v2',
          description: 'High-accuracy embedding configuration for v2 models.'
        },
        {
          key: 'semantic-encoder-v1',
          description: 'Semantic encoder tuned for text similarity.'
        },
        {
          key: 'vision-encoder-v3',
          description: 'Vision encoder for image feature extraction.'
        },
        {
          key: 'audio-encoder-x1',
          description: 'Audio encoder for waveform embeddings.'
        }
      ];

      const selectedParameters = new Set();

      function renderSelectionSummary() {
        selectedMachineText.textContent = machineName.value || 'None';
        selectedParametersText.textContent = selectedParameters.size
          ? Array.from(selectedParameters).join(', ')
          : 'None';
      }

      function updateParameterValue() {
        parameterName.value = Array.from(selectedParameters).join(', ');
      }

      function toggleParameter(key) {
        if (selectedParameters.has(key)) {
          selectedParameters.delete(key);
        } else {
          selectedParameters.add(key);
        }
        updateParameterValue();
        renderSelectionSummary();
        updateButtons();
        Array.from(parameterList.children).forEach((card) => {
          card.classList.toggle('selected', selectedParameters.has(card.dataset.key));
        });
      }

      function populateDemoData() {
        demoMachines.forEach((name) => {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          machineName.appendChild(option);
        });

        demoParameters.forEach((param) => {
          const card = document.createElement('div');
          card.className = 'param-card';
          card.dataset.key = param.key;
          card.innerHTML = `
            <div class="param-card-title">${param.key}</div>
            <div class="param-card-description">${param.description}</div>
          `;
          card.addEventListener('click', () => toggleParameter(param.key));
          parameterList.appendChild(card);
        });

        machineName.value = demoMachines[0];
        renderSelectionSummary();
        updateParameterValue();
      }

      populateDemoData();

      machineName.addEventListener('change', renderSelectionSummary);
      cancelBtn.disabled = true;
      retrainBtn.disabled = true;

      function updateButtons() {
        retrainBtn.disabled = !selectedParameters.size;
      }

      retrainBtn.addEventListener('click', () => {
        if (!selectedParameters.size) {
          statusText.textContent = 'Please select at least one parameter';
          return;
        }
        retrainBtn.disabled = true;
        cancelBtn.disabled = false;
        statusText.textContent = 'Retraining…';
      });

      cancelBtn.addEventListener('click', () => {
        retrainBtn.disabled = false;
        cancelBtn.disabled = true;
        statusText.textContent = 'Retraining cancelled';
      });
    </script>
  </body>
</html>
